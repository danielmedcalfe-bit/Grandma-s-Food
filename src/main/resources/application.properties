spring.application.name=grandmasfood

# R2DBC Configuration
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/grandmas_food_db
spring.r2dbc.username=postgres
spring.r2dbc.password=062003
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.max-idle-time=30m

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5432/grandmas_food_db
spring.flyway.user=postgres
spring.flyway.password=062003
spring.flyway.locations=classpath:db/migration
# spring.flyway.baseline-on-migrate=true

# Exclude Liquibase (we're using Flyway instead)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration

# Server
server.port=8080

# Logging
logging.level.org.springframework.r2dbc=DEBUG
logging.level.io.r2dbc.postgresql.QUERY=DEBUG


